---
deployment:
  tasks:
    # Install/update PHP dependencies (skips dev packages)
    - composer install --no-dev --optimize-autoloader

    # Sync compiled Vite assets to the public web root
    - mkdir -p ~/public_html/build && /bin/cp -Rf public/build/. ~/public_html/build/

    # Sync other public assets (images, htaccess, favicon, robots)
    - mkdir -p ~/public_html/images && /bin/cp -Rf public/images/. ~/public_html/images/
    - /bin/cp public/.htaccess ~/public_html/.htaccess
    - /bin/cp public/favicon.ico ~/public_html/favicon.ico 2>/dev/null || true
    - /bin/cp public/robots.txt ~/public_html/robots.txt 2>/dev/null || true

    # Sync views and build manifest to the running Laravel app
    - /bin/cp -Rf resources/views/. ~/laravel/resources/views/
    - mkdir -p ~/laravel/public/build && /bin/cp -Rf public/build/. ~/laravel/public/build/

    # Rebuild Laravel's config/route/view caches for production speed
    - php /home/odanzuii/laravel/artisan optimize:clear
    - php /home/odanzuii/laravel/artisan optimize
